<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TokenLab - המחשה אינטראקטיבית לטוקנים במודלי שפה גדולים"
    />
    <meta name="theme-color" content="#0a0d14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Rubik:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>TokenLab — איך מודל שפה קורא משפט?</title>
  </head>
  <body>
    <canvas
      id="matrix-bg"
      style="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:.5;"
    ></canvas>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const c = document.getElementById('matrix-bg'),
          x = c.getContext('2d')
        const chars = '0123456789'
        let f = 16,
          cols,
          drops
        function init() {
          c.width = innerWidth
          c.height = innerHeight
          cols = Math.floor(c.width / f)
          drops = Array(cols).fill(1)
        }
        init()
        addEventListener('resize', init)
        setInterval(() => {
          x.fillStyle = 'rgba(2,8,20,0.08)'
          x.fillRect(0, 0, c.width, c.height)
          x.font = f + 'px monospace'
          for (let i = 0; i < drops.length; i++) {
            const t = chars[(Math.random() * chars.length) | 0]
            x.fillStyle = Math.random() > 0.92 ? '#cfe6ff' : '#4d8bff'
            x.fillText(t, i * f, drops[i] * f)
            if (drops[i] * f > c.height && Math.random() > 0.975) drops[i] = 0
            drops[i]++
          }
        }, 50)
      })()
    </script>
  </body>
</html>
